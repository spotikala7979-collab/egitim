version: "3.9"

services:
  fero-egitim:
    build: .
    container_name: fero-egitim
    restart: unless-stopped
    ports:
      - "6969:6969"
    environment:
      - APP_NAME=Fero Eğitim
      - ENABLE_COLLECTORS=true
      - EGITIM_RISE_THRESHOLD_PCT=20.0
      - EGITIM_POLL_SECONDS=60
      - LOG_LEVEL=INFO
      - EGITIM_STORE_FILE=/app/data/egitim_store.json
    volumes:
      - ./data:/app/data
