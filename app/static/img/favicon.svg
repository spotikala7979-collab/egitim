<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Koyu yuvarlatılmış arka plan -->
  <rect width="64" height="64" rx="13" fill="#0b0f14"/>

  <!-- Clip: sol yarı (yeşil) -->
  <clipPath id="cl">
    <rect x="0" y="0" width="32" height="64"/>
  </clipPath>
  <!-- Clip: sağ yarı (kırmızı) -->
  <clipPath id="cr">
    <rect x="32" y="0" width="32" height="64"/>
  </clipPath>

  <!-- R - yeşil sol yarı -->
  <text x="32" y="48"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="46"
        fill="#18d47b"
        clip-path="url(#cl)">R</text>

  <!-- R - kırmızı sağ yarı -->
  <text x="32" y="48"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="46"
        fill="#ff5d5d"
        clip-path="url(#cr)">R</text>

  <!-- Ortada ince ayırıcı çizgi -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#0b0f14" stroke-width="1.5" opacity="0.6"/>
</svg>
